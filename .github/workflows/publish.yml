# Publishes the package to PyPI when a GitHub Release is published.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token to store. Before the first
# release, configure a trusted publisher for this repo on PyPI:
#   https://docs.pypi.org/trusted-publishers/  (workflow: publish.yml, env: pypi)
name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/civitai-hub/
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
