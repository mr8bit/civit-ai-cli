# Runs when a GitHub Release is published:
#  - github-release: build the wheel + sdist and attach them to the release
#    (always works — uses the built-in GITHUB_TOKEN). This makes the package
#    pip-installable straight from GitHub, no PyPI required.
#  - pypi: also publish to PyPI via Trusted Publishing (OIDC). Configure a
#    trusted publisher first: https://docs.pypi.org/trusted-publishers/
#    (project: civitai-hub, workflow: publish.yml, environment: pypi).
name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  github-release:
    name: Attach wheel + sdist to the GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Guard package version matches the release tag
        run: |
          V=$(grep -oP '__version__\s*=\s*"\K[^"]+' src/civitai_hub/__init__.py)
          [ "v$V" = "${{ github.event.release.tag_name }}" ] || {
            echo "::error::package version $V != release tag ${{ github.event.release.tag_name }}"; exit 1; }
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Upload artifacts to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber

  pypi:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/civitai-hub/
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v6
      - name: Guard package version matches the release tag
        run: |
          V=$(grep -oP '__version__\s*=\s*"\K[^"]+' src/civitai_hub/__init__.py)
          [ "v$V" = "${{ github.event.release.tag_name }}" ] || {
            echo "::error::package version $V != release tag ${{ github.event.release.tag_name }}"; exit 1; }
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
